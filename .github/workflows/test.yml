name: Test (spec-driven)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spec:
    name: Spec coverage (unit + e2e + gate)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: armoury_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://test:test@localhost:5432/armoury_test
      AUTH_SECRET: ci-test-secret-not-used-in-prod
      AUTH_URL: http://localhost:3000
      NODE_ENV: test
      CI: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps chromium
      - name: Apply DB migrations
        working-directory: apps/web
        run: npx tsx db/migrate.ts
      - name: Seed test data
        working-directory: apps/web
        run: npx tsx db/seed.ts
      - name: Build app
        working-directory: apps/web
        env:
          ALLOWED_ORIGINS: localhost
        run: npm run build
      - name: Unit specs (vitest)
        working-directory: apps/web
        run: npm run test:unit
      - name: E2E specs (playwright)
        working-directory: apps/web
        run: npm run test:e2e
      - name: Spec coverage report (loose, gate not yet enforced)
        working-directory: apps/web
        if: always()
        run: npm run test:coverage:loose
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spec-coverage
          path: apps/web/spec-coverage.md
          if-no-files-found: warn
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'apps/web/spec-coverage.md';
            if (!fs.existsSync(path)) return;
            const body = fs.readFileSync(path, 'utf8');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body.slice(0, 60000)
            });
